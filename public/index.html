<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DockDock Agent</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input, button { padding: 10px; margin: 4px 0; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 20px; padding: 12px; background: #f4f4f4; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>DockDock Agent</h1>
  <form id="deployForm">
    <label>Image</label>
    <input type="text" id="image" value="nginx" required>

    <label>Tag</label>
    <input type="text" id="tag" value="1.25" required>

    <label>Server URL</label>
    <input type="text" id="serverUrl" value="http://localhost:3000" required>

    <label>Server Token (optional)</label>
    <input type="text" id="serverToken">

    <button type="submit">Deploy</button>
  </form>
  <div id="status"></div>

  <script>
    const form = document.getElementById('deployForm');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const image = document.getElementById('image').value;
      const tag = document.getElementById('tag').value;
      const serverUrl = document.getElementById('serverUrl').value;
      const serverToken = document.getElementById('serverToken').value;

      statusEl.textContent = 'Starting...';
      try {
        const res = await fetch('/api/v1/deploy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image, tag, serverUrl, serverToken }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        statusEl.textContent = 'Job: ' + data.id;
        poll(data.id);
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      }
    });

    async function poll(id) {
      const interval = setInterval(async () => {
        const res = await fetch('/api/v1/jobs/' + id);
        const data = await res.json();
        statusEl.textContent = JSON.stringify(data, null, 2);
        if (data.status === 'ready' || data.status === 'failed') {
          clearInterval(interval);
        }
      }, 2000);
    }
  </script>
</body>
</html>
